<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 830" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#D4E4FC"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1260" height="830" fill="#FAFBFE"/>

  <!-- ================================================================
       MASTER LAYOUT
       ================================================================
       Row-label gutter : x = 0 .. 90   (text centered at x=45)
       Dashed separator : x = 80
       Content area     : x = 90 .. 1240

       Column centers   : 250,  530,  810,  1090
       Box width        : 240   (x = center-120 .. center+120)
       LLM box width    : 244   (x = center-122 .. center+122)

       VERTICAL FLOW
       ─────────────────────────────────────────────────
       Trigger box      : y =  20 ..  72
       Arrow            : y =  72 .. 102
       Agent box        : y = 102 .. 156
       Arrow            : y = 156 .. 192
       Horizontal bar   : y = 192
       Short ticks      : y = 192 .. 204   (no arrowhead)
       Step labels      : y = 222          (text baseline, BELOW ticks)
       Arrows to plan   : y = 232 .. 262   (arrowhead into plan box)
       Plan boxes       : y = 265 .. 315   (h=50)
       Arrows           : y = 315 .. 345
       LLM boxes        : y = 350 .. 550   (h=200)
       Arrows           : y = 550 .. 580
       Outcome boxes    : y = 585 .. 653   (h=68)
       ================================================================ -->

  <!-- ===== TRIGGER BOX ===== -->
  <rect x="510" y="20" width="280" height="52" rx="26" fill="white" stroke="#C2D1E8" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="548" cy="46" r="14" fill="none" stroke="#4A90D9" stroke-width="1.6"/>
  <line x1="543" y1="46" x2="553" y2="46" stroke="#4A90D9" stroke-width="1.6"/>
  <line x1="548" y1="41" x2="548" y2="51" stroke="#4A90D9" stroke-width="1.6"/>
  <text x="570" y="42" font-size="13" font-weight="600" fill="#1a1a1a">New Candidate Interview</text>
  <text x="570" y="58" font-size="13" font-weight="600" fill="#1a1a1a">Request</text>

  <!-- Arrow: trigger -> agent -->
  <line x1="650" y1="72" x2="650" y2="100" stroke="#6B7280" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="662" y="92" font-size="11" fill="#6B7280" font-style="italic">Activates</text>

  <!-- ===== AGENT BOX ===== -->
  <rect x="510" y="104" width="280" height="52" rx="10" fill="white" stroke="#4A90D9" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="536" y="116" width="18" height="24" rx="3" fill="none" stroke="#4A90D9" stroke-width="1.4"/>
  <circle cx="545" cy="122" r="4" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <line x1="539" y1="130" x2="551" y2="130" stroke="#4A90D9" stroke-width="1"/>
  <line x1="539" y1="134" x2="549" y2="134" stroke="#4A90D9" stroke-width="1"/>
  <text x="562" y="127" font-size="14" font-weight="700" fill="#1a1a1a">Interviewer AI Agent</text>
  <text x="562" y="145" font-size="11" fill="#6B7280">Powered by NVIDIA NIM</text>

  <!-- Arrow: agent -> horizontal bar -->
  <line x1="650" y1="156" x2="650" y2="192" stroke="#6B7280" stroke-width="1.4"/>

  <!-- ===== HORIZONTAL CONNECTOR BAR ===== -->
  <line x1="250" y1="192" x2="1090" y2="192" stroke="#6B7280" stroke-width="1.4"/>

  <!-- 4 SHORT TICKS down from bar (y=192 to y=204, NO arrowheads) -->
  <line x1="250"  y1="192" x2="250"  y2="204" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="530"  y1="192" x2="530"  y2="204" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="810"  y1="192" x2="810"  y2="204" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="1090" y1="192" x2="1090" y2="204" stroke="#6B7280" stroke-width="1.4"/>

  <!-- STEP LABELS (below ticks, above arrows — clear of both) -->
  <text x="250"  y="222" font-size="14" fill="#4A90D9" font-weight="600" text-anchor="middle">Step 1</text>
  <text x="530"  y="222" font-size="14" fill="#4A90D9" font-weight="600" text-anchor="middle">Step 2</text>
  <text x="810"  y="222" font-size="14" fill="#4A90D9" font-weight="600" text-anchor="middle">Step 3</text>
  <text x="1090" y="222" font-size="14" fill="#4A90D9" font-weight="600" text-anchor="middle">Step 4</text>

  <!-- ARROWS from step labels down to plan boxes (y=234 to y=262) -->
  <line x1="250"  y1="234" x2="250"  y2="262" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="530"  y1="234" x2="530"  y2="262" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="810"  y1="234" x2="810"  y2="262" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="1090" y1="234" x2="1090" y2="262" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== ROW LABELS (left gutter, rotated -90deg) ===== -->
  <!-- Each label is centered at x=42. After -90deg rotation,     -->
  <!-- the ~13px font height spans x=35..49 — fully inside viewBox -->

  <!-- "Plan Steps" — vertically centered on plan row (y=290) -->
  <text x="42" y="290" font-size="14" fill="#4A90D9" font-weight="700" text-anchor="middle" transform="rotate(-90,42,290)">Plan Steps</text>

  <!-- "LLM Decisioning" — vertically centered on LLM row (y=450) -->
  <text x="42" y="450" font-size="14" fill="#4A90D9" font-weight="700" text-anchor="middle" transform="rotate(-90,42,450)">LLM Decisioning</text>

  <!-- "Outcome" — vertically centered on outcome row (y=619) -->
  <text x="42" y="619" font-size="14" fill="#4A90D9" font-weight="700" text-anchor="middle" transform="rotate(-90,42,619)">Outcome</text>

  <!-- Dashed vertical separator between labels and content -->
  <line x1="80" y1="265" x2="80" y2="655" stroke="#D8E2F0" stroke-width="1" stroke-dasharray="5,4"/>


  <!-- ================================================================ -->
  <!--  STEP 1 — Candidate Profile Ingestion          center=250       -->
  <!-- ================================================================ -->

  <!-- Plan Step Box  y=265..315 -->
  <rect x="130" y="265" width="240" height="50" rx="8" fill="url(#stepGrad)" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="154" cy="290" r="8" fill="none" stroke="#4A90D9" stroke-width="1.4"/>
  <line x1="160" y1="296" x2="165" y2="301" stroke="#4A90D9" stroke-width="1.4" stroke-linecap="round"/>
  <text x="176" y="286" font-size="12.5" font-weight="700" fill="#1a1a1a">Candidate Profile</text>
  <text x="176" y="302" font-size="12.5" font-weight="700" fill="#1a1a1a">Ingestion</text>

  <!-- Arrow: plan -> LLM -->
  <line x1="250" y1="315" x2="250" y2="347" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LLM Decisioning Box  y=350..550 -->
  <rect x="128" y="350" width="244" height="200" rx="8" fill="white" stroke="#DCE4F0" stroke-width="1" filter="url(#shadow)"/>

  <circle cx="148" cy="381" r="4" fill="#4A90D9"/>
  <text x="160" y="377" font-size="11.5" fill="#333">Fetches GitHub repos,</text>
  <text x="160" y="392" font-size="11.5" fill="#333">languages, and commit patterns</text>

  <circle cx="148" cy="421" r="4" fill="#4A90D9"/>
  <text x="160" y="417" font-size="11.5" fill="#333">Parses resume (PDF/DOCX/TXT)</text>
  <text x="160" y="432" font-size="11.5" fill="#333">using intelligent LLM extraction</text>

  <circle cx="148" cy="461" r="4" fill="#4A90D9"/>
  <text x="160" y="457" font-size="11.5" fill="#333">Identifies key skills, projects,</text>
  <text x="160" y="472" font-size="11.5" fill="#333">and experience areas</text>

  <circle cx="148" cy="504" r="4" fill="#4A90D9"/>
  <text x="160" y="500" font-size="11.5" fill="#333">Detects candidate role and</text>
  <text x="160" y="515" font-size="11.5" fill="#333">industry from profile data</text>

  <!-- Arrow: LLM -> Outcome -->
  <line x1="250" y1="550" x2="250" y2="582" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Outcome Box  y=585..653 -->
  <rect x="128" y="585" width="244" height="68" rx="8" fill="#EDF2FF" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="148" cy="611" r="4" fill="#4A90D9"/>
  <text x="160" y="607" font-size="11.5" fill="#333">Comprehensive candidate</text>
  <text x="160" y="622" font-size="11.5" fill="#333">profile for question generation</text>


  <!-- ================================================================ -->
  <!--  STEP 2 — Personalized Question Generation     center=530       -->
  <!-- ================================================================ -->

  <!-- Plan Step Box  y=265..315 -->
  <rect x="410" y="265" width="240" height="50" rx="8" fill="url(#stepGrad)" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <rect x="432" y="279" width="8" height="8" rx="1" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <rect x="443" y="279" width="8" height="8" rx="1" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <rect x="432" y="290" width="8" height="8" rx="1" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <rect x="443" y="290" width="8" height="8" rx="1" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="458" y="286" font-size="12.5" font-weight="700" fill="#1a1a1a">Personalized Question</text>
  <text x="458" y="302" font-size="12.5" font-weight="700" fill="#1a1a1a">Generation</text>

  <!-- Arrow: plan -> LLM -->
  <line x1="530" y1="315" x2="530" y2="347" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LLM Decisioning Box  y=350..550 -->
  <rect x="408" y="350" width="244" height="200" rx="8" fill="white" stroke="#DCE4F0" stroke-width="1" filter="url(#shadow)"/>

  <circle cx="428" cy="381" r="4" fill="#4A90D9"/>
  <text x="440" y="377" font-size="11.5" fill="#333">Generates 15 tailored questions</text>
  <text x="440" y="392" font-size="11.5" fill="#333">across 5 categories</text>

  <circle cx="428" cy="421" r="4" fill="#4A90D9"/>
  <text x="440" y="417" font-size="11.5" fill="#333">Applies interviewer persona</text>
  <text x="440" y="432" font-size="11.5" fill="#333">tone and focus areas</text>

  <circle cx="428" cy="461" r="4" fill="#4A90D9"/>
  <text x="440" y="457" font-size="11.5" fill="#333">Grounds every question in the</text>
  <text x="440" y="472" font-size="11.5" fill="#333">candidate's real projects &amp; code</text>

  <circle cx="428" cy="504" r="4" fill="#4A90D9"/>
  <text x="440" y="500" font-size="11.5" fill="#333">Sets initial difficulty based on</text>
  <text x="440" y="515" font-size="11.5" fill="#333">detected experience level</text>

  <!-- Arrow: LLM -> Outcome -->
  <line x1="530" y1="550" x2="530" y2="582" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Outcome Box  y=585..653 -->
  <rect x="408" y="585" width="244" height="68" rx="8" fill="#EDF2FF" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="428" cy="611" r="4" fill="#4A90D9"/>
  <text x="440" y="607" font-size="11.5" fill="#333">A personalized, role-specific</text>
  <text x="440" y="622" font-size="11.5" fill="#333">question bank ready to deliver</text>


  <!-- ================================================================ -->
  <!--  STEP 3 — Adaptive Interview Session           center=810       -->
  <!-- ================================================================ -->

  <!-- Plan Step Box  y=265..315 -->
  <rect x="690" y="265" width="240" height="50" rx="8" fill="url(#stepGrad)" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <rect x="713" y="279" width="16" height="12" rx="2" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <polygon points="719,291 722,296 725,291" fill="none" stroke="#4A90D9" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="736" y="286" font-size="12.5" font-weight="700" fill="#1a1a1a">Adaptive Interview</text>
  <text x="736" y="302" font-size="12.5" font-weight="700" fill="#1a1a1a">Session</text>

  <!-- Arrow: plan -> LLM -->
  <line x1="810" y1="315" x2="810" y2="347" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LLM Decisioning Box  y=350..550 -->
  <rect x="688" y="350" width="244" height="200" rx="8" fill="white" stroke="#DCE4F0" stroke-width="1" filter="url(#shadow)"/>

  <circle cx="708" cy="381" r="4" fill="#4A90D9"/>
  <text x="720" y="377" font-size="11.5" fill="#333">Conducts real-time browser</text>
  <text x="720" y="392" font-size="11.5" fill="#333">interview with 100s countdown</text>

  <circle cx="708" cy="421" r="4" fill="#4A90D9"/>
  <text x="720" y="417" font-size="11.5" fill="#333">Adjusts difficulty dynamically</text>
  <text x="720" y="432" font-size="11.5" fill="#333">based on rolling performance</text>

  <circle cx="708" cy="461" r="4" fill="#4A90D9"/>
  <text x="720" y="457" font-size="11.5" fill="#333">Generates follow-up probes:</text>
  <text x="720" y="472" font-size="11.5" fill="#333">clarify, dig deeper, or move on</text>

  <circle cx="708" cy="504" r="4" fill="#4A90D9"/>
  <text x="720" y="500" font-size="11.5" fill="#333">Tracks claims, contradictions,</text>
  <text x="720" y="515" font-size="11.5" fill="#333">and demonstrated skills live</text>

  <!-- Arrow: LLM -> Outcome -->
  <line x1="810" y1="550" x2="810" y2="582" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Outcome Box  y=585..653 -->
  <rect x="688" y="585" width="244" height="68" rx="8" fill="#EDF2FF" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="708" cy="611" r="4" fill="#4A90D9"/>
  <text x="720" y="607" font-size="11.5" fill="#333">Rich interview data with</text>
  <text x="720" y="622" font-size="11.5" fill="#333">behavioral and integrity signals</text>


  <!-- ================================================================ -->
  <!--  STEP 4 — Evaluation & Report Generation       center=1090      -->
  <!-- ================================================================ -->

  <!-- Plan Step Box  y=265..315 -->
  <rect x="970" y="265" width="240" height="50" rx="8" fill="url(#stepGrad)" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <polygon points="994,280 997,288 1004,288 998,293 1000,300 994,296 988,300 990,293 984,288 991,288" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="1012" y="286" font-size="12.5" font-weight="700" fill="#1a1a1a">Evaluation &amp; Report</text>
  <text x="1012" y="302" font-size="12.5" font-weight="700" fill="#1a1a1a">Generation</text>

  <!-- Arrow: plan -> LLM -->
  <line x1="1090" y1="315" x2="1090" y2="347" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LLM Decisioning Box  y=350..550 -->
  <rect x="968" y="350" width="244" height="200" rx="8" fill="white" stroke="#DCE4F0" stroke-width="1" filter="url(#shadow)"/>

  <circle cx="988" cy="381" r="4" fill="#4A90D9"/>
  <text x="1000" y="377" font-size="11.5" fill="#333">Scores answers on accuracy,</text>
  <text x="1000" y="392" font-size="11.5" fill="#333">depth, communication, ownership</text>

  <circle cx="988" cy="421" r="4" fill="#4A90D9"/>
  <text x="1000" y="417" font-size="11.5" fill="#333">Detects suspicious patterns:</text>
  <text x="1000" y="432" font-size="11.5" fill="#333">speed anomalies, generic answers</text>

  <circle cx="988" cy="461" r="4" fill="#4A90D9"/>
  <text x="1000" y="457" font-size="11.5" fill="#333">Generates behavioral authenticity</text>
  <text x="1000" y="472" font-size="11.5" fill="#333">fingerprint for each candidate</text>

  <circle cx="988" cy="504" r="4" fill="#4A90D9"/>
  <text x="1000" y="500" font-size="11.5" fill="#333">Produces full Markdown + PDF</text>
  <text x="1000" y="515" font-size="11.5" fill="#333">report with hire/no-hire verdict</text>

  <!-- Arrow: LLM -> Outcome -->
  <line x1="1090" y1="550" x2="1090" y2="582" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Outcome Box  y=585..653  (same h=68 as all others) -->
  <rect x="968" y="585" width="244" height="68" rx="8" fill="#EDF2FF" stroke="#B8C9E8" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="988" cy="605" r="4" fill="#4A90D9"/>
  <text x="1000" y="609" font-size="11.5" fill="#333">Complete hiring evaluation</text>
  <circle cx="988" cy="629" r="4" fill="#4A90D9"/>
  <text x="1000" y="633" font-size="11.5" fill="#333">Owner dashboard with replay</text>

</svg>